<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calls</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0B141A; color: #E9EDEF; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app { width: 100%; max-width: 430px; height: 100vh; max-height: 850px; background: #111B21; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(20,195,122,0.08); position: relative; }
        .header { padding: 16px 20px 8px 20px; display: flex; justify-content: space-between; align-items: center; background: #111B21; border-bottom: 1px solid #1F2C33; }
        .header .logo { font-size: 22px; font-weight: 700; }
        .header .logo span { color: #14C37A; }
        .header .actions { display: flex; gap: 16px; color: #7E8A95; }
        .header .actions i { cursor: pointer; transition: 0.2s; }
        .header .actions i:hover { color: #E9EDEF; }
        .content { flex: 1; overflow-y: auto; padding: 8px 16px 0; }
        .call-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #1F2C33; cursor: pointer; }
        .call-item .avatar { width: 48px; height: 48px; border-radius: 50%; background: #2A3942; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; overflow: hidden; flex-shrink: 0; margin-right: 12px; }
        .call-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .call-item .info { flex: 1; }
        .call-item .info .name { font-weight: 500; font-size: 16px; }
        .call-item .info .details { font-size: 13px; color: #7E8A95; display: flex; align-items: center; gap: 4px; }
        .call-item .info .details .missed { color: #E74C3C; }
        .call-item .meta { text-align: right; }
        .call-item .meta .time { font-size: 12px; color: #7E8A95; }
        .call-item .meta .call-btn { background: #14C37A; color: #111B21; border: none; padding: 6px 12px; border-radius: 30px; font-weight: 600; font-size: 12px; cursor: pointer; margin-top: 4px; }
        .bottom-nav { display: flex; background: #111B21; border-top: 1px solid #1F2C33; padding: 6px 0 12px 0; justify-content: space-around; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #7E8A95; font-size: 10px; font-weight: 500; cursor: pointer; transition: 0.2s; gap: 2px; padding: 4px 0; position: relative; }
        .nav-item i { font-size: 24px; }
        .nav-item.active { color: #14C37A; }
        .nav-item.active .dot { display: block; }
        .nav-item .dot { display: none; width: 6px; height: 6px; border-radius: 50%; background: #14C37A; margin-top: 2px; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #14C37A; color: #111B21; padding: 8px 20px; border-radius: 8px; font-weight: 600; z-index: 999; display: none; }
        .toast.error { background: #E74C3C; color: #fff; }
        .empty-state { text-align: center; padding: 60px 20px; color: #7E8A95; }
        .empty-state i { font-size: 48px; color: #1F2C33; display: block; margin-bottom: 12px; }
        .call-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0B141A; z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .call-overlay.show { display: flex; }
        .call-overlay .avatar { width: 100px; height: 100px; border-radius: 50%; background: #2A3942; display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; border: 3px solid #14C37A; }
        .call-overlay .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .call-overlay .name { font-size: 24px; font-weight: 700; margin-top: 16px; }
        .call-overlay .status { color: #7E8A95; margin-top: 4px; }
        .call-overlay .actions { display: flex; gap: 40px; margin-top: 40px; }
        .call-overlay .actions button { width: 64px; height: 64px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .call-overlay .actions .end-call { background: #E74C3C; color: #fff; }
        .call-overlay .actions .mute-call { background: #1F2C33; color: #E9EDEF; }
        .call-overlay .actions .speaker-call { background: #1F2C33; color: #E9EDEF; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">NEXORA<span>CHQT</span></div>
        <div class="actions">
            <i data-lucide="phone" class="w-5 h-5" id="startCallBtn"></i>
            <i data-lucide="video" class="w-5 h-5" id="videoCallBtn"></i>
        </div>
    </div>
    <div class="content" id="callList">
        <!-- populated by JS -->
    </div>
    <div class="bottom-nav">
        <div class="nav-item" id="navChats"><i data-lucide="message-square"></i><span>Chats</span><div class="dot"></div></div>
        <div class="nav-item active" id="navCalls"><i data-lucide="phone"></i><span>Calls</span><div class="dot"></div></div>
        <div class="nav-item" id="navStatus"><i data-lucide="circle"></i><span>Status</span><div class="dot"></div></div>
        <div class="nav-item" id="navCommunities"><i data-lucide="users"></i><span>Communities</span><div class="dot"></div></div>
        <div class="nav-item" id="navSettings"><i data-lucide="settings"></i><span>Settings</span><div class="dot"></div></div>
    </div>
</div>

<div class="call-overlay" id="callOverlay">
    <div class="avatar" id="callAvatar">📞</div>
    <div class="name" id="callName">Calling...</div>
    <div class="status" id="callStatus">Connecting...</div>
    <div class="actions">
        <button class="mute-call" id="muteBtn"><i data-lucide="mic-off" class="w-6 h-6"></i></button>
        <button class="end-call" id="endCallBtn"><i data-lucide="phone-off" class="w-6 h-6"></i></button>
        <button class="speaker-call" id="speakerBtn"><i data-lucide="speaker" class="w-6 h-6"></i></button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    lucide.createIcons();

    const toast = document.getElementById('toast');
    function showToast(text, isError = false) {
        toast.textContent = text;
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.style.display = 'block';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    document.addEventListener('DOMContentLoaded', async function() {
        const ok = await checkAuth(true);
        if (!ok) return;

        document.getElementById('navChats').addEventListener('click', () => goTo('dashboard.html'));
        document.getElementById('navStatus').addEventListener('click', () => goTo('status.html'));
        document.getElementById('navCommunities').addEventListener('click', () => goTo('communities.html'));
        document.getElementById('navSettings').addEventListener('click', () => goTo('settings.html'));

        const token = getToken();
        const socket = connectSocket(token);

        // Load call history
        function loadCalls() {
            const container = document.getElementById('callList');
            const calls = JSON.parse(localStorage.getItem('callHistory') || '[]');
            if (calls.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="phone-off"></i>
                        <p>No calls yet</p>
                        <p style="font-size:13px;margin-top:4px;">Start a call with your contacts</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            let html = '';
            calls.slice().reverse().forEach(c => {
                const isMissed = c.type === 'missed';
                const icon = c.direction === 'outgoing' ? '📤' : '📥';
                const statusClass = isMissed ? 'missed' : '';
                html += `
                    <div class="call-item" data-phone="${c.phone}">
                        <div class="avatar">${c.name?.charAt(0) || '?'}</div>
                        <div class="info">
                            <div class="name">${c.name || 'Unknown'}</div>
                            <div class="details">
                                <span>${icon}</span>
                                <span class="${statusClass}">${isMissed ? 'Missed' : (c.direction === 'outgoing' ? 'Outgoing' : 'Incoming')}</span>
                                <span>• ${c.time}</span>
                            </div>
                        </div>
                        <div class="meta">
                            <div class="time">${c.date}</div>
                            <button class="call-btn" data-phone="${c.phone}">Call</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            lucide.createIcons();

            container.querySelectorAll('.call-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const phone = this.dataset.phone;
                    startCall(phone);
                });
            });
        }

        loadCalls();

        // ---- WebRTC Call start ----
        async function startCall(phone) {
            const overlay = document.getElementById('callOverlay');
            overlay.classList.add('show');
            document.getElementById('callName').textContent = phone || 'Unknown';
            document.getElementById('callStatus').textContent = 'Calling...';

            // Get local media stream
            let localStream = null;
            let peerConnection = null;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                // We'll use the stream for audio only (voice call)
            } catch(err) {
                showToast('Cannot access microphone', true);
                overlay.classList.remove('show');
                return;
            }

            // Create peer connection
            const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            // Create offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            // Send offer via socket
            socket.emit('call-user', { target: phone, offer: offer });

            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { target: phone, candidate: event.candidate });
                }
            };

            // Handle remote stream
            peerConnection.ontrack = (event) => {
                const remoteStream = event.streams[0];
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play();
                document.getElementById('callStatus').textContent = 'Connected';
            };

            // Set timeout for connection
            const timeout = setTimeout(() => {
                if (document.getElementById('callStatus').textContent === 'Calling...') {
                    document.getElementById('callStatus').textContent = 'No answer';
                    showToast('No answer', true);
                }
            }, 30000);

            // Listen for answer
            socket.on('call-answered', (data) => {
                clearTimeout(timeout);
                const answer = data.answer;
                peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                document.getElementById('callStatus').textContent = 'Connected';
                // Add to history
                const calls = JSON.parse(localStorage.getItem('callHistory') || '[]');
                calls.push({
                    phone: phone,
                    name: 'Contact',
                    direction: 'outgoing',
                    type: 'connected',
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString()
                });
                localStorage.setItem('callHistory', JSON.stringify(calls));
                loadCalls();
            });

            // Listen for ICE candidates from remote
            socket.on('ice-candidate', (data) => {
                if (data.candidate) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            // Listen for end call
            socket.on('call-ended', () => {
                overlay.classList.remove('show');
                if (peerConnection) peerConnection.close();
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                showToast('Call ended');
            });

            // End call button
            document.getElementById('endCallBtn').onclick = function() {
                overlay.classList.remove('show');
                socket.emit('end-call', { target: phone });
                if (peerConnection) peerConnection.close();
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                showToast('Call ended');
            };

            // Mute button
            document.getElementById('muteBtn').onclick = function() {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    this.classList.toggle('active');
                    showToast(audioTrack.enabled ? 'Unmuted' : 'Muted');
                }
            };

            // Speaker button
            document.getElementById('speakerBtn').onclick = function() {
                // In mobile browsers, you can't easily toggle speaker, but we can simulate
                this.classList.toggle('active');
                showToast(this.classList.contains('active') ? 'Speaker on' : 'Speaker off');
            };
        }

        // ---- Incoming call handling ----
        if (socket) {
            socket.on('incoming-call', async (data) => {
                const { from, offer } = data;
                if (confirm(`Incoming call from ${from}?`)) {
                    // Answer call
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
                    const pc = new RTCPeerConnection(config);
                    stream.getTracks().forEach(track => pc.addTrack(track, stream));
                    await pc.setRemoteDescription(new RTCSessionDescription(offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    socket.emit('answer-call', { target: from, answer });

                    pc.onicecandidate = (event) => {
                        if (event.candidate) {
                            socket.emit('ice-candidate', { target: from, candidate: event.candidate });
                        }
                    };
                    pc.ontrack = (event) => {
                        const remoteStream = event.streams[0];
                        const audio = new Audio();
                        audio.srcObject = remoteStream;
                        audio.play();
                        document.getElementById('callStatus').textContent = 'Connected';
                    };
                    // Show overlay for incoming call
                    const overlay = document.getElementById('callOverlay');
                    overlay.classList.add('show');
                    document.getElementById('callName').textContent = from;
                    document.getElementById('callStatus').textContent = 'Connected';
                    // End call button
                    document.getElementById('endCallBtn').onclick = function() {
                        overlay.classList.remove('show');
                        socket.emit('end-call', { target: from });
                        pc.close();
                        stream.getTracks().forEach(t => t.stop());
                        showToast('Call ended');
                    };
                } else {
                    socket.emit('end-call', { target: from });
                }
            });
        }

        // ---- Start call from FAB ----
        document.getElementById('startCallBtn').addEventListener('click', function() {
            const phone = prompt('Enter phone number to call:');
            if (phone && phone.trim()) startCall(phone.trim());
        });

        document.getElementById('videoCallBtn').addEventListener('click', function() {
            showToast('📹 Video call starting...');
            const phone = prompt('Enter phone number for video call:');
            if (phone && phone.trim()) {
                // For video, we need to get video stream as well
                // We'll just start a voice call with video flag for now
                startCall(phone.trim());
            }
        });
    });
</script>
</body>
</html>
