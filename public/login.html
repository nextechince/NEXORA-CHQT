    const prefixSpan = document.getElementById('countryPrefix');
    const phoneInput = document.getElementById('phoneInput');

    countries.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.code;
        opt.textContent = `${c.name} (${c.code})`;
        opt.dataset.example = c.example || 'Phone number';
        select.appendChild(opt);
    });

    // Set default to Nigeria
    select.value = '+234';
    updateUI();

    // Update on change
    select.addEventListener('change', function() {
        const selected = this.options[this.selectedIndex];
        const code = this.value;
        const example = selected.dataset.example || 'Phone number';
        prefixSpan.textContent = code;
        phoneInput.placeholder = `e.g., ${example}`;
    });

    function updateUI() {
        const selected = select.options[select.selectedIndex];
        const code = select.value;
        const example = selected ? selected.dataset.example : 'Phone number';
        prefixSpan.textContent = code;
        phoneInput.placeholder = `e.g., ${example}`;
    }

    document.getElementById('continueBtn').addEventListener('click', async function() {
        const phone = phoneInput.value.trim();
        const code = select.value;
        if (!phone) return alert('Enter phone number');
        const fullPhone = code + phone;
        const cleanPhone = fullPhone.replace(/[\s\-\(\)]/g, '');
        const res = await fetch('/api/request-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: cleanPhone })
        });
        const data = await res.json();
        if (data.success) {
            sessionStorage.setItem('verifyPhone', cleanPhone);
            sessionStorage.setItem('otpCode', data.otp);
            goTo('otp.html');
        } else {
            alert('Failed to send OTP');
        }
    });
