<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0B141A; color: #E9EDEF; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app { width: 100%; max-width: 430px; height: 100vh; max-height: 850px; background: #111B21; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(20,195,122,0.08); position: relative; }

        .header { padding: 16px 20px 8px 20px; display: flex; align-items: center; gap: 12px; background: #111B21; border-bottom: 1px solid #1F2C33; }
        .header .back { color: #7E8A95; cursor: pointer; font-size: 24px; }
        .header .title { font-size: 20px; font-weight: 700; flex: 1; }
        .header .badge { background: #E74C3C; color: #fff; padding: 2px 10px; border-radius: 30px; font-size: 12px; font-weight: 600; }

        .content { flex: 1; overflow-y: auto; padding: 8px 16px 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { background: #1F2C33; border-radius: 12px; padding: 14px; text-align: center; }
        .stat-card .number { font-size: 28px; font-weight: 700; color: #14C37A; }
        .stat-card .label { font-size: 13px; color: #7E8A95; margin-top: 2px; }

        .section-title { font-size: 16px; font-weight: 600; margin: 16px 0 8px; }
        .report-item { background: #1F2C33; border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left: 3px solid #E74C3C; }
        .report-item .reporter { font-weight: 500; }
        .report-item .target { color: #7E8A95; font-size: 13px; }
        .report-item .reason { font-size: 14px; margin: 4px 0; }
        .report-item .actions { display: flex; gap: 8px; margin-top: 6px; }
        .report-item .actions button { padding: 4px 12px; border-radius: 20px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; }
        .report-item .actions .ban-btn { background: #E74C3C; color: #fff; }
        .report-item .actions .ignore-btn { background: #2A3942; color: #E9EDEF; }

        .user-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #1F2C33; }
        .user-item .avatar { width: 36px; height: 36px; border-radius: 50%; background: #2A3942; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; overflow: hidden; margin-right: 12px; }
        .user-item .info { flex: 1; }
        .user-item .info .name { font-weight: 500; }
        .user-item .info .phone { font-size: 13px; color: #7E8A95; }
        .user-item .status { font-size: 12px; padding: 2px 10px; border-radius: 30px; }
        .user-item .status.banned { background: #E74C3C; color: #fff; }
        .user-item .status.active { background: #14C37A; color: #111B21; }
        .user-item .status.warned { background: #F39C12; color: #111B21; }

        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #14C37A; color: #111B21; padding: 8px 20px; border-radius: 8px; font-weight: 600; z-index: 999; display: none; }
        .toast.error { background: #E74C3C; color: #fff; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <span class="back" id="backBtn"><i data-lucide="arrow-left" class="w-6 h-6"></i></span>
        <div class="title">Admin Dashboard</div>
        <span class="badge" id="reportBadge">0</span>
    </div>

    <div class="content" id="adminContent">
        <!-- populated by JS -->
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    lucide.createIcons();

    const toast = document.getElementById('toast');
    function showToast(text, isError = false) {
        toast.textContent = text;
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.style.display = 'block';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    document.addEventListener('DOMContentLoaded', async function() {
        const ok = await checkAuth(true);
        if (!ok) return;

        document.getElementById('backBtn').addEventListener('click', () => goTo('settings.html'));

        const token = getToken();

        // Check if user is admin (hardcoded admin phone)
        let isAdmin = false;
        try {
            const res = await fetch('/api/me', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
            const data = await res.json();
            if (data.success && data.user.phone === '+2348123909919') {
                isAdmin = true;
            }
        } catch(e) {}

        if (!isAdmin) {
            document.getElementById('adminContent').innerHTML = `
                <div class="empty-state" style="text-align:center;padding:40px 0;color:#7E8A95;">
                    <i data-lucide="shield" style="font-size:48px;display:block;margin-bottom:12px;"></i>
                    <p>Access denied. Admin only.</p>
                </div>
            `;
            lucide.createIcons();
            return;
        }

        await loadAdminData();
    });

    async function loadAdminData() {
        const container = document.getElementById('adminContent');
        const token = getToken();

        try {
            // Fetch reports
            const reportsRes = await fetch('/api/reports');
            const reports = await reportsRes.json();

            // Fetch users
            const usersRes = await fetch('/api/users');
            const users = await usersRes.json();

            document.getElementById('reportBadge').textContent = reports.length;

            const totalUsers = users.length;
            const bannedUsers = users.filter(u => u.banned).length;
            const warnedUsers = users.filter(u => u.warnings > 0).length;

            let html = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="number">${totalUsers}</div><div class="label">Total Users</div></div>
                    <div class="stat-card"><div class="number">${bannedUsers}</div><div class="label">Banned</div></div>
                    <div class="stat-card"><div class="number">${warnedUsers}</div><div class="label">Warned</div></div>
                    <div class="stat-card"><div class="number">${reports.length}</div><div class="label">Reports</div></div>
                </div>

                <div class="section-title">📋 Reports</div>
            `;

            if (reports.length === 0) {
                html += `<p style="color:#7E8A95;">No reports yet.</p>`;
            } else {
                reports.forEach(r => {
                    html += `
                        <div class="report-item">
                            <div class="reporter">Reported by: ${r.reportedBy}</div>
                            <div class="target">Target: ${r.targetId} (${r.target})</div>
                            <div class="reason">Reason: ${r.reason}</div>
                            <div class="actions">
                                <button class="ban-btn" onclick="banUser('${r.reportedBy}')">Ban User</button>
                                <button class="ignore-btn" onclick="ignoreReport('${r.timestamp}')">Ignore</button>
                            </div>
                        </div>
                    `;
                });
            }

            html += `<div class="section-title">👥 Users</div>`;

            users.slice(0, 10).forEach(u => {
                const status = u.banned ? 'banned' : (u.warnings > 0 ? 'warned' : 'active');
                const statusLabel = u.banned ? 'Banned' : (u.warnings > 0 ? `Warned (${u.warnings})` : 'Active');
                html += `
                    <div class="user-item">
                        <div class="avatar">${u.displayName?.charAt(0) || '?'}</div>
                        <div class="info">
                            <div class="name">${u.displayName || 'Unknown'}</div>
                            <div class="phone">${u.phone}</div>
                        </div>
                        <div class="status ${status}">${statusLabel}</div>
                    </div>
                `;
            });

            if (users.length > 10) {
                html += `<p style="color:#7E8A95;text-align:center;padding:8px;">+ ${users.length - 10} more users</p>`;
            }

            container.innerHTML = html;
            lucide.createIcons();

        } catch(e) {
            showToast('Failed to load admin data', true);
        }
    }

    window.banUser = async function(phone) {
        if (confirm(`Ban user ${phone}?`)) {
            const token = getToken();
            try {
                const res = await fetch('/api/admin/ban-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, banPhone: phone, permanent: true })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('User banned');
                    loadAdminData();
                } else {
                    showToast(data.error || 'Failed', true);
                }
            } catch(e) {
                showToast('Network error', true);
            }
        }
    };

    window.ignoreReport = function(timestamp) {
        showToast('Report ignored');
        loadAdminData();
    };
</script>
</body>
</html>
