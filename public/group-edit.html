<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0B141A; color: #E9EDEF; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app { width: 100%; max-width: 430px; height: 100vh; max-height: 850px; background: #111B21; border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(20,195,122,0.08); position: relative; }
        .header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; background: #111B21; border-bottom: 1px solid #1F2C33; }
        .header .back { color: #7E8A95; cursor: pointer; font-size: 24px; }
        .header .title { font-size: 20px; font-weight: 700; flex: 1; }
        .header .save-btn { color: #14C37A; font-weight: 600; cursor: pointer; }

        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .avatar-circle { width: 80px; height: 80px; border-radius: 50%; background: #2A3942; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; border: 2px solid #14C37A; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-circle i { font-size: 32px; color: #7E8A95; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 14px; color: #7E8A95; margin-bottom: 4px; }
        .input-group input, .input-group textarea { width: 100%; background: #1F2C33; border: none; color: #E9EDEF; padding: 12px; border-radius: 12px; outline: none; font-size: 16px; }
        .input-group textarea { min-height: 80px; resize: vertical; }
        .settings-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #1F2C33; }
        .settings-item .left { flex: 1; }
        .settings-item .left .title { font-size: 16px; font-weight: 500; }
        .settings-item .left .desc { font-size: 13px; color: #7E8A95; }
        .settings-item .right { color: #7E8A95; }
        .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #37474f; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #14C37A; }
        input:checked + .slider:before { transform: translateX(20px); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #14C37A; color: #111B21; padding: 8px 20px; border-radius: 8px; font-weight: 600; z-index: 999; display: none; }
        .toast.error { background: #E74C3C; color: #fff; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="back" id="backBtn"><i data-lucide="arrow-left" class="w-5 h-5"></i></div>
        <div class="title">Edit Group</div>
        <div class="save-btn" id="saveBtn">Save</div>
    </div>

    <div class="content">
        <div class="avatar-circle" id="avatarPicker">
            <i data-lucide="camera" class="w-8 h-8"></i>
        </div>
        <input type="file" id="avatarFile" accept="image/*" style="display:none;" />

        <div class="input-group">
            <label>Group Name</label>
            <input type="text" id="groupName" />
        </div>
        <div class="input-group">
            <label>Description</label>
            <textarea id="groupDesc" placeholder="Optional description"></textarea>
        </div>

        <div class="settings-item">
            <div class="left"><div class="title">Group Type</div><div class="desc">Public or Private</div></div>
            <div class="right">
                <select id="groupType" style="background:#1F2C33; color:#E9EDEF; border:none; padding:4px 8px; border-radius:8px;">
                    <option value="public">Public</option>
                    <option value="private">Private</option>
                </select>
            </div>
        </div>

        <div class="settings-item">
            <div class="left"><div class="title">Topics</div><div class="desc">Divide group chat into topics</div></div>
            <div class="right"><label class="toggle"><input type="checkbox" id="topicsEnabled"><span class="slider"></span></label></div>
        </div>

        <div class="settings-item">
            <div class="left"><div class="title">Reactions</div><div class="desc">Allow message reactions</div></div>
            <div class="right"><label class="toggle"><input type="checkbox" id="reactionsEnabled" checked><span class="slider"></span></label></div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    lucide.createIcons();
    const toast = document.getElementById('toast');
    function showToast(text, isError = false) {
        toast.textContent = text;
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.style.display = 'block';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    document.addEventListener('DOMContentLoaded', async function() {
        const ok = await checkAuth(true);
        if (!ok) return;

        document.getElementById('backBtn').addEventListener('click', () => goTo('communities.html'));

        const urlParams = new URLSearchParams(window.location.search);
        const groupId = urlParams.get('id');
        if (!groupId) { showToast('No group specified', true); return; }

        const token = getToken();
        let group = null;
        let avatarData = null;

        try {
            const res = await fetch(`/api/group/${groupId}`);
            const data = await res.json();
            if (!data.success) { showToast('Group not found', true); return; }
            group = data.group;
            document.getElementById('groupName').value = group.name || '';
            document.getElementById('groupDesc').value = group.description || '';
            document.getElementById('groupType').value = group.type || 'public';
            if (group.topicsEnabled) document.getElementById('topicsEnabled').checked = true;
            if (group.reactionsEnabled !== undefined) document.getElementById('reactionsEnabled').checked = group.reactionsEnabled;
            if (group.avatar) {
                document.getElementById('avatarPicker').innerHTML = `<img src="${group.avatar}" />`;
            }
        } catch(e) { showToast('Failed to load group', true); }

        document.getElementById('avatarPicker').addEventListener('click', () => document.getElementById('avatarFile').click());
        document.getElementById('avatarFile').addEventListener('change', function(e) {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    avatarData = ev.target.result;
                    document.getElementById('avatarPicker').innerHTML = `<img src="${avatarData}" />`;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('saveBtn').addEventListener('click', async function() {
            const name = document.getElementById('groupName').value.trim();
            const description = document.getElementById('groupDesc').value.trim();
            const type = document.getElementById('groupType').value;
            const topicsEnabled = document.getElementById('topicsEnabled').checked;
            const reactionsEnabled = document.getElementById('reactionsEnabled').checked;
            if (!name) { showToast('Name is required', true); return; }
            const updates = { token, groupId, name, description, type, topicsEnabled, reactionsEnabled };
            if (avatarData) updates.avatar = avatarData;
            try {
                const res = await fetch('/api/update-group', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Group updated!');
                    setTimeout(() => goTo(`group-info.html?id=${groupId}`), 1200);
                } else {
                    showToast(data.error || 'Failed', true);
                }
            } catch(e) { showToast('Network error', true); }
        });
    });
</script>
</body>
</html>
